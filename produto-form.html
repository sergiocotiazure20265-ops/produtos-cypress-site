<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlueStock | Produto</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand" id="linkHomeFormulario" href="produtos.html">
      <div class="brand-logo" id="logoSistemaFormulario">BS</div>
      <div>
        <h1>BlueStock</h1>
        <p>Controle de produtos</p>
      </div>
    </a>
    <nav class="menu" aria-label="Menu principal">
      <a id="menuConsultaProdutos" href="produtos.html">Produtos</a>
      <a id="menuCadastroProduto" class="active" href="produto-form.html">Novo produto</a>
      <button id="btnSairFormulario" class="btn btn-outline" type="button">Sair</button>
    </nav>
  </header>

  <main class="container narrow">
    <section class="page-title">
      <div>
        <span class="badge">Cadastro</span>
        <h2 id="tituloFormularioProduto">Cadastrar produto</h2>
        <p class="muted">Preencha os dados abaixo para salvar o produto.</p>
      </div>
    </section>

    <section class="panel form-panel">
      <div id="alertaFormularioProduto" class="alert hidden" role="alert"></div>

      <form id="formProduto" autocomplete="off">
        <input id="produtoId" type="hidden" />

        <div class="form-grid">
          <div class="field">
            <label for="codigoProduto">Código</label>
            <input id="codigoProduto" name="codigoProduto" type="text" placeholder="PRD-001" required />
          </div>

          <div class="field">
            <label for="nomeProduto">Nome do produto</label>
            <input id="nomeProduto" name="nomeProduto" type="text" placeholder="Notebook Pro 15" required minlength="3" />
          </div>

          <div class="field">
            <label for="categoriaProduto">Categoria</label>
            <select id="categoriaProduto" name="categoriaProduto" required>
              <option value="">Selecione</option>
              <option value="Informática">Informática</option>
              <option value="Eletrônicos">Eletrônicos</option>
              <option value="Escritório">Escritório</option>
              <option value="Acessórios">Acessórios</option>
              <option value="Outros">Outros</option>
            </select>
          </div>

          <div class="field">
            <label for="precoProduto">Preço</label>
            <input id="precoProduto" name="precoProduto" type="number" min="0.01" step="0.01" placeholder="2500.00" required />
          </div>

          <div class="field">
            <label for="estoqueProduto">Quantidade em estoque</label>
            <input id="estoqueProduto" name="estoqueProduto" type="text" placeholder="10" required />
          </div>

          <div class="field">
            <label for="statusProduto">Status</label>
            <select id="statusProduto" name="statusProduto" required>
              <option value="Ativo">Ativo</option>
              <option value="Inativo">Inativo</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="descricaoProduto">Descrição</label>
          <textarea id="descricaoProduto" name="descricaoProduto" rows="4" placeholder="Descrição resumida do produto"></textarea>
        </div>

        <div class="form-actions">
          <a id="btnCancelarProduto" class="btn btn-secondary" href="produtos.html">Cancelar</a>
          <button id="btnSalvarProduto" class="btn btn-primary" type="submit">Salvar produto</button>
        </div>
      </form>
    </section>
  </main>

  <script src="js/app.js"></script>
  <script src="js/produto-form.js"></script>
</body>
</html>
